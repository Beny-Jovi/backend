spring.application.name=marketplace

spring.config.import=env.properties

spring.datasource.driver-class-name=${DB_CLASSNAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_DATASOURCE_URL}

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# check nulable with hibernate
spring.jpa.properties.hibernate.check_nullability=true

# For Auth
jwt.secret=${ACCESS_TOKEN}
jwt.refresh=${REFRESH_TOKEN}
jwt.expiration=3600000

# set upload file size
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.resolve-lazily=false

# upload image directory

file.upload-profile = ${PATH_FILE_UPLOAD}

#disabling restart spring
spring.devtools.restart.enabled = false
#spring.devtools.restart.trigger-file = ${devtools_trigger_file}

# set hibernate generation ddl

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# h2 database config for testing purposes
spring.datasource.test.url=jdbc:h2:mem/unit_test_db
spring.datasource.test.diver-class-name=org.h2.Driver
spring.datasource.test.username=sa
spring.datasource.test.password=password
spring.jpa.test.hibernate.ddl-auto = create-drop

# turn off jpa open in view

# spring.jpa.open-in-view = false
# spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
# turn off spring datasource hikari auto commit

# spring.datasource.hikari.auto-commit=false

# log jpa

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# log with spring
logging.level.org.springframework.web = DEBUG
logging.level.com.marketplace = TRACE
logging.level.org.springframework.orm.jpa.JpaTransactionManager=DEBUG

# spring security logging
logging.level.org.springframework.security=DEBUG

# ecs log structured
#logging.structured.format.console=ecs
#logging.structured.format.file=ecs
#logging.file.name=logs/log.json

# log file safe path
# logging.file.name=logs/app.log
# logging.file.path=logs/app.log

# spring.threads.virtual.enabled=true
# spring.thread-executor = virtual

# handle json serialization

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.indent-output=true

# session servlet

server.servlet.session.cookie.name=CSRF_TOKEN
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.secure=true

springdoc.swagger-ui.path=/swagger-ui/index.html