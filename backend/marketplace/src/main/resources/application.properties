spring.application.name=marketplace

spring.config.import=env.properties

spring.datasource.driver-class-name=${DB_CLASSNAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_DATASOURCE_URL}

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# log jpa

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# log with spring
logging.level.org.springframework.web = DEBUG
logging.level.com.marketplace = TRACE

# ecs log structured
logging.structured.format.console=ecs

logging.structured.format.file=ecs
logging.file.name=logs/log.json

# log file safe path
# logging.file.name=logs/app.log
# logging.file.path=logs/app.log

